name: interlocks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  interlocks:
    runs-on: ubuntu-latest
    env:
      INTERLOCKS_CI_CONTEXT: ${{ github.event_name == 'push' && 'main_push' || 'pr' }}
    steps:
      - uses: actions/checkout@v6
      - uses: 0xjgv/interlocks@v1

      # Advisory unblock pass: one self-sufficient command writes the full
      # `.lintfix/` set (plan + optimize + metrics) and emits PR annotations.
      # Non-failing by design — it exits 0 with no candidates and only emits
      # `::notice::` / `::warning::` lines, so CI is never broken by suggestions.
      - name: Unblock pass (advisory)
        if: always()
        run: >-
          interlocks fix-optimize
          --base=origin/${{ github.event.pull_request.base.ref || 'main' }}
          --annotate --metrics

      - name: Upload .lintfix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lintfix-${{ github.run_id }}
          path: .lintfix/
          if-no-files-found: ignore
          retention-days: 14
