name: interlocks-advance
# Auto-PR the next baseline floor when a green main run lifted measured
# values above the recorded floor. Runs only after the main `interlocks`
# workflow finishes on a push to main, so PR runs never trigger advance.

on:
  workflow_run:
    workflows: ["interlocks"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  advance:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"

      - name: Install interlocks
        shell: bash
        run: uv tool install interlocks

      - name: Re-run quality stage to populate run-summary.json
        shell: bash
        env:
          INTERLOCKS_CI_CONTEXT: main_push
        run: interlocks ci

      - name: Advance baseline floor
        id: advance
        shell: bash
        run: interlocks baseline advance --auto-pr --json | tee advance.json

      - name: Open advance PR
        if: ${{ hashFiles('.interlocks/baseline.json') != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(baseline): advance floor"
          branch: chore/baseline-advance
          title: "chore(baseline): advance floor"
          body: |
            Auto-generated by `interlocks baseline advance` after a green main run.
            See `.interlocks/baseline.json` for the new floor.
          add-paths: .interlocks/baseline.json
