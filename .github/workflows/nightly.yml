name: nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  interlocks-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"

      - name: Install project
        run: uv sync

      - name: Run interlocks nightly
        run: uv run interlocks nightly
