name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  interlocks-ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}

      # Cache uvx-fetched tool wheels keyed on bundled pins. Cold cache → warm
      # step pays the network cost once; subsequent runs ride the cache and
      # `UV_OFFLINE=1` keeps gates hermetic.
      - name: Restore uvx tool cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uvx-tools-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('interlocks/defaults/tools.py', 'interlocks/defaults/tools.txt') }}
          restore-keys: |
            uvx-tools-${{ runner.os }}-${{ matrix.python }}-

      - name: Install project
        run: uv sync

      - name: Warm uvx cache
        run: uv run interlocks warm

      - name: Run interlocks ci
        env:
          UV_OFFLINE: "1"
        run: uv run interlocks ci

      - name: Wheel install smoke test
        if: hashFiles('tests/test_wheel_install.py') != ''
        run: uv run pytest -m slow tests/test_wheel_install.py
