name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  interlocks-ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install project
        run: uv sync

      - name: Run interlocks ci
        run: uv run interlocks ci

      - name: Wheel install smoke test
        if: hashFiles('tests/test_wheel_install.py') != ''
        run: uv run pytest -m slow tests/test_wheel_install.py
