name: release-mutmut

on:
  workflow_dispatch:
  push:
    tags:
      - "mutmut-v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"

      - name: Clone pinned upstream mutmut
        run: |
          git clone https://github.com/boxed/mutmut.git /tmp/mutmut-fork
          git -C /tmp/mutmut-fork checkout e31d923c734383ddb7df4aa439ab3c60fd7d629a

      - name: Copy interlocks-mutmut package template
        run: cp vendor/mutmut-fork/pyproject.toml /tmp/mutmut-fork/pyproject.toml

      - name: Verify tag matches template version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/mutmut-v')
        run: |
          version=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("/tmp/mutmut-fork/pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          expected="mutmut-v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match template version ${expected}" >&2
            exit 1
          fi

      - name: Patch distribution-name fallback
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("/tmp/mutmut-fork/src/mutmut/__init__.py")
          text = path.read_text(encoding="utf-8")
          old = '__version__ = importlib.metadata.version("mutmut")\n'
          new = (
              'try:\n'
              '    __version__ = importlib.metadata.version("mutmut")\n'
              'except importlib.metadata.PackageNotFoundError:\n'
              '    __version__ = importlib.metadata.version("interlocks-mutmut")\n'
          )
          if old not in text:
              raise SystemExit(f"Patch target missing in {path}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Build sdist and wheel
        working-directory: /tmp/mutmut-fork
        run: uv build

      - name: Validate artifacts
        working-directory: /tmp/mutmut-fork
        run: |
          unzip -l dist/interlock_mutmut-*.whl | grep ' mutmut/'
          uvx twine check dist/*

      - name: Smoke-test wheel
        working-directory: /tmp/mutmut-fork
        run: |
          uv venv /tmp/interlocks-mutmut-smoke
          uv pip install --python /tmp/interlocks-mutmut-smoke/bin/python dist/interlock_mutmut-*.whl
          /tmp/interlocks-mutmut-smoke/bin/python -c 'import mutmut; print(mutmut.__version__)'
          /tmp/interlocks-mutmut-smoke/bin/mutmut --help

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: interlocks-mutmut-dist
          path: /tmp/mutmut-fork/dist/
          retention-days: 1

  publish-to-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi-mutmut
      url: https://test.pypi.org/p/interlocks-mutmut
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: interlocks-mutmut-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  publish-to-pypi:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/mutmut-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi-mutmut
      url: https://pypi.org/p/interlocks-mutmut
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: interlocks-mutmut-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
