name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"

      - name: Restore uvx tool cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uvx-tools-${{ runner.os }}-3.11-${{ hashFiles('interlocks/defaults/tools.py', 'interlocks/defaults/tools.txt') }}
          restore-keys: |
            uvx-tools-${{ runner.os }}-3.11-

      - name: Install project
        run: uv sync

      - name: Warm uvx cache
        run: uv run interlocks warm

      - name: Run interlocks ci
        env:
          UV_OFFLINE: "1"
        run: uv run interlocks ci

      - name: Run interlocks nightly
        env:
          UV_OFFLINE: "1"
        run: uv run interlocks nightly

      - name: Wheel install smoke test
        if: hashFiles('tests/test_wheel_install.py') != ''
        run: uv run pytest -m slow tests/test_wheel_install.py

  publish-to-testpypi:
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/interlocks
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  build-and-publish:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/interlocks
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"

      - name: Verify tag matches project version
        run: |
          version=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          expected="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version ${expected}" >&2
            exit 1
          fi

      - name: Require green ci.yml on main for tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(git rev-parse HEAD)
          conclusion=$(gh run list \
            --workflow=ci.yml --branch=main --commit="$sha" \
            --json conclusion --jq '.[0].conclusion // "missing"')
          if [ "$conclusion" != "success" ]; then
            echo "::error::ci.yml on main is '$conclusion' for $sha — refusing to publish" >&2
            exit 1
          fi
          echo "ci.yml succeeded on main for $sha"

      - name: Build sdist and wheel
        run: uv build

      - name: Restore uvx tool cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uvx-tools-${{ runner.os }}-3.11-${{ hashFiles('interlocks/defaults/tools.py', 'interlocks/defaults/tools.txt') }}
          restore-keys: |
            uvx-tools-${{ runner.os }}-3.11-

      - name: Smoke-test built wheel
        env:
          SMOKE_VENV: /tmp/release-smoke
          SMOKE_PROJECT: /tmp/release-smoke-project
        run: |
          uv venv "$SMOKE_VENV"
          uv pip install --python "$SMOKE_VENV/bin/python" dist/interlocks-*.whl
          "$SMOKE_VENV/bin/interlocks" --help
          "$SMOKE_VENV/bin/interlocks" version
          mkdir -p "$SMOKE_PROJECT"
          cd "$SMOKE_PROJECT"
          git init -q
          "$SMOKE_VENV/bin/interlocks" init
          "$SMOKE_VENV/bin/interlocks" doctor
          "$SMOKE_VENV/bin/interlocks" check

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
