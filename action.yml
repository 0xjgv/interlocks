name: interlocks CI
description: Install interlocks and run the repository quality pipeline through interlocks ci.

inputs:
  python-version:
    description: Python version used to install interlocks and run interlocks.
    required: false
    default: "3.13"
  install-command:
    description: Command that installs interlocks before running CI.
    required: false
    default: python -m pip install interlocks
  command:
    description: interlocks command to run.
    required: false
    default: interlocks ci

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install interlocks
      shell: bash
      run: |
        python -m pip install --upgrade pip
        ${{ inputs.install-command }}

    - name: Run interlocks
      shell: bash
      run: python -m interlocks.github_action --command "${{ inputs.command }}"
