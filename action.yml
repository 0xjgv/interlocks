name: interlocks CI
description: Install interlocks via uv and run the repository quality pipeline through interlocks ci.

inputs:
  python-version:
    description: Python version used to install interlocks and run interlocks.
    required: false
    default: "3.11"
  install-command:
    description: Command that installs interlocks before running CI.
    required: false
    default: uv tool install interlocks
  command:
    description: interlocks command to run.
    required: false
    default: interlocks ci

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Restore uvx tool cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uvx-tools-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('interlocks/defaults/tools.py', 'interlocks/defaults/tools.txt') }}
        restore-keys: |
          uvx-tools-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Install interlocks
      shell: bash
      run: ${{ inputs.install-command }}

    - name: Warm uvx cache
      shell: bash
      run: interlocks warm

    - name: Run interlocks
      shell: bash
      env:
        UV_OFFLINE: "1"
      run: python -m interlocks.github_action --command "${{ inputs.command }}"
